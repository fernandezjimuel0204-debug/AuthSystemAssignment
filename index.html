<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding:15px;
}

.container{
    width:100%;
    max-width:400px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background: rgba(255,255,255,0.2);
    color:white;
    font-size:16px;
}

input::placeholder{
    color:#eee;
}

input:focus{
    outline:none;
    background: rgba(255,255,255,0.3);
}

button{
    width:100%;
    padding:15px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    font-size:16px;
    transition:0.3s ease;
    background:white;
    color:#764ba2;
}

button:hover{
    transform:translateY(-2px);
}

.google{
    background: #ffffff20;
    color:white;
    border:1px solid rgba(255,255,255,0.3);
}

.link{
    text-align:center;
    margin-top:18px;
    font-size:14px;
    cursor:pointer;
    color:#f1f1f1;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <!-- SIGN UP -->
    <div id="signupDiv">
        <h2>Create Account</h2>
        <input type="text" id="firstName" placeholder="First Name">
        <input type="text" id="lastName" placeholder="Last Name">
        <input type="date" id="birthdate">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button id="signupBtn">Sign Up</button>
        <button class="google" id="googleSignUp">Sign Up with Google</button>
        <div class="link" onclick="showLogin()">Already have an account? Log In</div>
    </div>

    <!-- LOGIN -->
    <div id="loginDiv" class="hidden">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Log In</button>
        <button class="google" id="googleLogin">Login with Google</button>
        <div class="link" onclick="showSignup()">Don't have an account? Sign Up</div>
    </div>

    <!-- COMPLETE PROFILE -->
    <div id="completeProfileDiv" class="hidden">
        <h2>Complete Profile</h2>
        <input type="text" id="gFirstName" placeholder="First Name">
        <input type="text" id="gLastName" placeholder="Last Name">
        <input type="date" id="gBirthdate">
        <button id="saveProfileBtn">Save Information</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
        <h2>Welcome</h2>
        <p id="userEmail"></p>
        <p id="userInfo"></p>
        <button id="logoutBtn">Log Out</button>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCE4WOqqapSFvoif_K7euTH7GIidzUq3Fg",
  authDomain: "authsystemassignment.firebaseapp.com",
  projectId: "authsystemassignment",
  storageBucket: "authsystemassignment.firebasestorage.app",
  messagingSenderId: "696784203952",
  appId: "1:696784203952:web:4dc66c1ae13967cdac4b75"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

window.showLogin = function(){
    signupDiv.classList.add("hidden");
    loginDiv.classList.remove("hidden");
}

window.showSignup = function(){
    loginDiv.classList.add("hidden");
    signupDiv.classList.remove("hidden");
}

// EMAIL SIGNUP
signupBtn.onclick = async () => {

    if(!firstName.value || !lastName.value || !birthdate.value){
        alert("Fill all personal information.");
        return;
    }

    try{
        const cred = await createUserWithEmailAndPassword(
            auth,
            signupEmail.value,
            signupPassword.value
        );

        await setDoc(doc(db, "users", cred.user.uid), {
            firstName: firstName.value,
            lastName: lastName.value,
            birthdate: birthdate.value,
            email: cred.user.email
        });

    }catch(error){
        alert(error.message);
    }
};

// GOOGLE SIGNUP
googleSignUp.onclick = async () => {
    const result = await signInWithPopup(auth, provider);
    const userDoc = await getDoc(doc(db, "users", result.user.uid));

    if(!userDoc.exists()){
        signupDiv.classList.add("hidden");
        completeProfileDiv.classList.remove("hidden");
    }
};

saveProfileBtn.onclick = async () => {

    if(!gFirstName.value || !gLastName.value || !gBirthdate.value){
        alert("Complete your profile.");
        return;
    }

    const user = auth.currentUser;

    await setDoc(doc(db, "users", user.uid), {
        firstName: gFirstName.value,
        lastName: gLastName.value,
        birthdate: gBirthdate.value,
        email: user.email
    });

    completeProfileDiv.classList.add("hidden");
};

// LOGIN
loginBtn.onclick = () => {
    signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value)
    .catch(error => alert(error.message));
};

googleLogin.onclick = () => {
    signInWithPopup(auth, provider);
};

logoutBtn.onclick = () => {
    signOut(auth);
};

onAuthStateChanged(auth, async (user) => {

    if(user){
        const userDoc = await getDoc(doc(db, "users", user.uid));

        if(userDoc.exists()){
            const data = userDoc.data();

            signupDiv.classList.add("hidden");
            loginDiv.classList.add("hidden");
            completeProfileDiv.classList.add("hidden");
            dashboard.classList.remove("hidden");

            userEmail.innerText = user.email;
            userInfo.innerText =
                data.firstName + " " + data.lastName +
                " | Born: " + data.birthdate;
        }
    }else{
        dashboard.classList.add("hidden");
        signupDiv.classList.remove("hidden");
    }

});

</script>
</body>
</html>
