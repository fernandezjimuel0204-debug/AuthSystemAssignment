<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:350px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
    background:#fafafa;
}

input:focus{
    outline:none;
    border-color:#999;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    background:#333;
    color:white;
}

button:hover{
    background:#555;
}

.google{
    background:#e0e0e0;
    color:#333;
}

.google:hover{
    background:#d6d6d6;
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#555;
}

.dashboard{
    text-align:center;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <!-- SIGN UP -->
    <div id="signupDiv">
        <h2>Create Account</h2>
        <input type="text" id="signupFname" placeholder="First Name">
        <input type="text" id="signupLname" placeholder="Last Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button id="signupBtn">Sign Up</button>
        <button class="google" id="googleSignUp">Sign Up with Google</button>
        <div class="link" onclick="showLogin()">Already have an account? Log In</div>
    </div>

    <!-- LOGIN -->
    <div id="loginDiv" class="hidden">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Log In</button>
        <button class="google" id="googleLogin">Login with Google</button>
        <div class="link" onclick="showSignup()">Don't have an account? Sign Up</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden dashboard">
        <h2>Welcome</h2>
        <p id="userEmail"></p>
        <button id="logoutBtn">Log Out</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCE4WOqqapSFvoif_K7euTH7GIidzUq3Fg",
    authDomain: "authsystemassignment.firebaseapp.com",
    projectId: "authsystemassignment",
    storageBucket: "authsystemassignment.firebasestorage.app",
    messagingSenderId: "696784203952",
    appId: "1:696784203952:web:4dc66c1ae13967cdac4b75"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// UI Switching
window.showLogin = function(){
    signupDiv.classList.add("hidden");
    loginDiv.classList.remove("hidden");
}

window.showSignup = function(){
    loginDiv.classList.add("hidden");
    signupDiv.classList.remove("hidden");
}

// SIGN UP
signupBtn.onclick = () => {
    createUserWithEmailAndPassword(auth, signupEmail.value, signupPassword.value)
    .catch(error => alert(error.message));
};

googleSignUp.onclick = () => {
    signInWithPopup(auth, provider);
};

// LOGIN
loginBtn.onclick = () => {
    signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value)
    .catch(error => alert(error.message));
};

googleLogin.onclick = () => {
    signInWithPopup(auth, provider);
};

// LOGOUT
logoutBtn.onclick = () => {
    signOut(auth);
};

// AUTH STATE DETECTION
onAuthStateChanged(auth, (user) => {
    if(user){
        signupDiv.classList.add("hidden");
        loginDiv.classList.add("hidden");
        dashboard.classList.remove("hidden");
        userEmail.innerText = user.email;
    } else {
        dashboard.classList.add("hidden");
        signupDiv.classList.remove("hidden");
    }
});
</script>

</body>

</html>
