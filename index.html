<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Auth System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg, #141e30, #243b55);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    background: rgba(25, 25, 35, 0.95);
    padding:35px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.05);
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#ffffff;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    background:#1f1f2e;
    color:white;
}

input:focus{
    outline:none;
    border-color:#8b5cf6;
}

.password-wrapper{
    position:relative;
}

.toggle-password{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:13px;
    color:#cbd5e1;
}

button{
    width:100%;
    padding:13px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    background: linear-gradient(90deg, #8b5cf6, #6366f1);
    color:white;
}

.google{
    background:white;
    color:#111;
}

.link{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    cursor:pointer;
    color:#cbd5e1;
}

.hidden{
    display:none;
}

.dashboard{
    text-align:center;
    color:white;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIGN UP -->
    <div id="signupDiv">
        <h2>Create Account</h2>
        <input type="text" id="signupFirstName" placeholder="First Name">
        <input type="text" id="signupLastName" placeholder="Last Name">
        <input type="email" id="signupEmail" placeholder="Email">

        <div class="password-wrapper">
            <input type="password" id="signupPassword" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword('signupPassword')">Show</span>
        </div>

        <button id="signupBtn">Sign Up</button>
        <div class="link" onclick="showLogin()">Already have an account? Log In</div>
    </div>

    <!-- LOGIN -->
    <div id="loginDiv" class="hidden">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">

        <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Password">
            <span class="toggle-password" onclick="togglePassword('loginPassword')">Show</span>
        </div>

        <button id="loginBtn">Log In</button>
        <div class="link" onclick="showSignup()">Don't have an account? Sign Up</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden dashboard">
        <h2>Welcome</h2>
        <p id="userEmail"></p>
        <button id="logoutBtn">Log Out</button>
    </div>

</div>

<script type="module">

// ✅ YOUR REAL FIREBASE CONFIG
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    updateProfile,
    sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCE4WOqqapSFvoif_K7euTH7GIidzUq3Fg",
  authDomain: "authsystemassignment.firebaseapp.com",
  projectId: "authsystemassignment",
  storageBucket: "authsystemassignment.firebasestorage.app",
  messagingSenderId: "696784203952",
  appId: "1:696784203952:web:4dc66c1ae13967cdac4b75"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 Strong password checker
function isStrongPassword(password){
    const strongRegex =
        /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
    return strongRegex.test(password);
}

// SHOW/HIDE PASSWORD
window.togglePassword = function(id){
    const input = document.getElementById(id);
    const toggle = input.nextElementSibling;

    if(input.type === "password"){
        input.type = "text";
        toggle.innerText = "Hide";
    } else {
        input.type = "password";
        toggle.innerText = "Show";
    }
}

// UI SWITCH
window.showLogin = function(){
    signupDiv.classList.add("hidden");
    loginDiv.classList.remove("hidden");
}

window.showSignup = function(){
    loginDiv.classList.add("hidden");
    signupDiv.classList.remove("hidden");
}

// SIGN UP
signupBtn.onclick = async () => {

    if(!isStrongPassword(signupPassword.value)){
        alert("Password must contain 8+ chars, uppercase, lowercase, number & special character.");
        return;
    }

    try {

        const userCredential = await createUserWithEmailAndPassword(
            auth,
            signupEmail.value,
            signupPassword.value
        );

        await updateProfile(userCredential.user, {
            displayName: signupFirstName.value + " " + signupLastName.value
        });

        await sendEmailVerification(userCredential.user);

        alert("Verification email sent! Please check your Gmail.");

        await signOut(auth);

    } catch (error) {
        alert(error.message);
    }
};

// LOGIN
loginBtn.onclick = async () => {

    try {
        const userCredential = await signInWithEmailAndPassword(
            auth,
            loginEmail.value,
            loginPassword.value
        );

        await userCredential.user.reload();

        if(!userCredential.user.emailVerified){
            alert("Please verify your email before logging in.");
            await signOut(auth);
            return;
        }

    } catch(error){
        alert(error.message);
    }
};

logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if(user){
        signupDiv.classList.add("hidden");
        loginDiv.classList.add("hidden");
        dashboard.classList.remove("hidden");

        userEmail.innerText = user.displayName 
            ? user.displayName + " (" + user.email + ")"
            : user.email;
    } else {
        dashboard.classList.add("hidden");
        signupDiv.classList.remove("hidden");
    }
});

</script>

</body>
</html>
